<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">

    <!-- כותרת הדף בדפדפן -->
    <title>הקובץ נשלח בהצלחה</title>

    <!-- התאמה לנייד -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- מניעת אינדוקס במנועי חיפוש -->
    <meta name="robots" content="noindex, nofollow, noarchive">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7fb;
            margin: 0;
            padding: 0;
            color: #222;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #444;
        }

        .buttons {
            margin-top: 30px;
        }

        a.button {
            display: inline-block;
            padding: 12px 20px;
            margin: 8px;
            background: #2d6cdf;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
        }

        a.button:hover {
            background: #1f57b7;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- הודעת הצלחה -->
    <h1>הקובץ נשלח בהצלחה 🎉</h1>

    <p>
        תודה! ההעלאה נשמרה במערכת.
    </p>

    <p>
        הקובץ יפורסם באתר רק לאחר בדיקה ואישור.
    </p>

    <!-- כפתורי ניווט -->
    <div class="buttons">

        <!-- חזרה להעלאה נוספת -->
        <a class="button" href="/upload/">להעלות קובץ נוסף</a>

        <!-- מעבר לגלריה -->
        <a class="button" href="/gallery/">מעבר לגלריה</a>

    </div>

</div>

</body>
</html>
