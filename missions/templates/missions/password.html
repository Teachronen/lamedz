<!DOCTYPE html>
<html>
<head>
    <title>כניסה לאתר</title>
</head>
<body style="text-align:center; margin-top:100px;">

    <h2>כניסה לאתר</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="password" name="password" placeholder="הכנס סיסמה">
        <button type="submit">כניסה</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

</body>
</html>
